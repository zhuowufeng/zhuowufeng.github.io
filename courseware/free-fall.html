<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自由落体与抛体运动</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }
  .container {
    max-width: 1060px;
    width: 100%;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    overflow: hidden;
    padding: 0 24px 24px 24px;
  }
  header {
    text-align: center;
    padding: 20px 0 14px 0;
    border-bottom: 2px solid #e8edf5;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 26px;
    color: #1a3a5c;
    letter-spacing: 4px;
    font-weight: 700;
  }
  header p { font-size: 13px; color: #7a8ba8; margin-top: 4px; }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .mode-btn {
    padding: 10px 28px;
    border: 2px solid #cddae9;
    border-radius: 10px;
    background: #f5f8fc;
    color: #3d5a7a;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:hover { background: #e8f0fe; border-color: #90b4de; }
  .mode-btn.active {
    background: #1a73e8;
    color: #fff;
    border-color: #1a73e8;
    box-shadow: 0 2px 8px rgba(26,115,232,0.3);
  }

  /* Main layout */
  .main-area {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  .canvas-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
    background: #fafbfc;
    border-radius: 14px;
    border: 1px solid #e0e8f0;
    overflow: hidden;
  }
  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 780 / 480;
  }

  /* Data panel */
  .data-panel {
    width: 220px;
    flex-shrink: 0;
    background: #f6f9ff;
    border-radius: 14px;
    border: 1px solid #e0e8f0;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .data-panel h3 {
    font-size: 14px;
    color: #1a3a5c;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid #dce5f0;
    letter-spacing: 2px;
  }
  .data-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    padding: 4px 0;
    border-bottom: 1px dashed #e8eff8;
  }
  .data-item .label { color: #5a7a9a; }
  .data-item .value {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: #1a3a5c;
    font-size: 15px;
    min-width: 70px;
    text-align: right;
  }
  .data-item .unit { color: #8a9aae; font-size: 12px; margin-left: 2px; }

  .energy-section {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid #dce5f0;
  }
  .energy-section .label { font-size: 13px; color: #5a7a9a; text-align: center; margin-bottom: 6px; }
  .energy-bar-bg {
    width: 100%;
    height: 22px;
    background: #e8eff8;
    border-radius: 11px;
    overflow: hidden;
    display: flex;
  }
  .energy-bar-bg .ke-fill {
    height: 100%;
    background: linear-gradient(90deg, #fd9340, #fcb045);
    transition: width 0.1s;
  }
  .energy-bar-bg .pe-fill {
    height: 100%;
    background: linear-gradient(90deg, #2e7ff0, #5b9cf5);
    transition: width 0.1s;
  }
  .energy-legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 5px;
    font-size: 12px;
    color: #5a7a9a;
  }
  .energy-legend span { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .legend-dot.ke { background: #fcb045; }
  .legend-dot.pe { background: #5b9cf5; }

  /* Controls */
  .controls {
    background: #f6f9ff;
    border-radius: 14px;
    border: 1px solid #e0e8f0;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px 20px;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 180px;
  }
  .ctrl-group label {
    font-size: 13px;
    color: #3d5a7a;
    white-space: nowrap;
    font-weight: 500;
    min-width: 70px;
  }
  .ctrl-group input[type="range"] {
    flex: 1;
    min-width: 60px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #d0dcec;
    border-radius: 2px;
    outline: none;
  }
  .ctrl-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1a73e8;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .ctrl-group input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1a73e8;
    cursor: pointer;
    border: none;
  }
  .ctrl-val {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: #1a3a5c;
    min-width: 40px;
    text-align: right;
    font-size: 14px;
  }
  .ctrl-val.small { min-width: 30px; }
  .ctrl-unit { font-size: 12px; color: #8a9aae; }

  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: #1a73e8;
    color: #fff;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary.running { background: #ea6a4a; }
  .btn-primary.running:hover { background: #d45535; }
  .btn-secondary {
    background: #e8eff8;
    color: #3d5a7a;
  }
  .btn-secondary:hover { background: #d5e0ef; }

  /* Hidden */
  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 820px) {
    .main-area { flex-direction: column; }
    .data-panel {
      width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 4px 16px;
      padding: 12px 16px;
    }
    .data-panel h3 { width: 100%; }
    .data-item { flex: 1; min-width: 100px; border-bottom: none; }
    .energy-section { width: 100%; }
    .controls { flex-direction: column; align-items: stretch; }
    .ctrl-group { min-width: 0; }
    .mode-btn { padding: 8px 16px; font-size: 13px; }
  }
  @media (max-width: 480px) {
    body { padding: 10px; }
    .container { padding: 0 12px 12px 12px; }
    header h1 { font-size: 20px; }
    .mode-selector { gap: 6px; }
    .mode-btn { padding: 6px 12px; font-size: 12px; }
    .btn { padding: 6px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>自由落体与抛体运动</h1>
    <p>Interactive Physics Simulator</p>
  </header>

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="freefall">自由落体</button>
    <button class="mode-btn" data-mode="vertical">竖直上抛</button>
    <button class="mode-btn" data-mode="projectile">平抛运动</button>
  </div>

  <div class="main-area">
    <div class="canvas-wrap">
      <canvas id="simCanvas" width="780" height="480"></canvas>
    </div>
    <div class="data-panel">
      <h3>实时数据</h3>
      <div class="data-item"><span class="label">时间 t</span><span><span class="value" id="dTime">0.0</span><span class="unit">s</span></span></div>
      <div class="data-item"><span class="label">高度 h</span><span><span class="value" id="dHeight">0.0</span><span class="unit">m</span></span></div>
      <div class="data-item"><span class="label">速度 v</span><span><span class="value" id="dSpeed">0.0</span><span class="unit">m/s</span></span></div>
      <div class="data-item" id="dXRow"><span class="label">水平位移 x</span><span><span class="value" id="dX">0.0</span><span class="unit">m</span></span></div>
      <div class="data-item" id="dYRow"><span class="label">竖直位移 y</span><span><span class="value" id="dY">0.0</span><span class="unit">m</span></span></div>
      <div class="energy-section">
        <div class="label">能量占比</div>
        <div class="energy-bar-bg">
          <div class="ke-fill" id="keFill" style="width:0%"></div>
          <div class="pe-fill" id="peFill" style="width:100%"></div>
        </div>
        <div class="energy-legend">
          <span><span class="legend-dot ke"></span>动能</span>
          <span><span class="legend-dot pe"></span>势能</span>
        </div>
        <div style="text-align:center;font-size:12px;color:#8a9aae;margin-top:2px;">
          总能量 E = <span id="dTotalE" style="font-weight:700;color:#1a3a5c;">0.0</span> J/kg
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>初始高度</label>
      <input type="range" id="heightSlider" min="10" max="100" value="50" step="1">
      <span class="ctrl-val" id="heightVal">50</span>
      <span class="ctrl-unit">m</span>
    </div>
    <div class="ctrl-group" id="velGroup">
      <label>初速度</label>
      <input type="range" id="velSlider" min="0" max="50" value="20" step="0.5">
      <span class="ctrl-val" id="velVal">20</span>
      <span class="ctrl-unit">m/s</span>
    </div>
    <div class="ctrl-group hidden" id="angleGroup">
      <label>抛射角</label>
      <input type="range" id="angleSlider" min="0" max="90" value="45" step="1">
      <span class="ctrl-val small" id="angleVal">45</span>
      <span class="ctrl-unit">&deg;</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn">开始</button>
      <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>
    <div class="ctrl-group" style="min-width:140px;flex:0.6;">
      <label>模拟速度</label>
      <input type="range" id="speedSlider" min="0.5" max="2" value="1" step="0.5">
      <span class="ctrl-val small" id="speedVal">1.0</span>
      <span class="ctrl-unit">x</span>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // DOM refs
  const dTime = document.getElementById('dTime');
  const dHeight = document.getElementById('dHeight');
  const dSpeed = document.getElementById('dSpeed');
  const dX = document.getElementById('dX');
  const dY = document.getElementById('dY');
  const dTotalE = document.getElementById('dTotalE');
  const keFill = document.getElementById('keFill');
  const peFill = document.getElementById('peFill');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const heightSlider = document.getElementById('heightSlider');
  const velSlider = document.getElementById('velSlider');
  const angleSlider = document.getElementById('angleSlider');
  const speedSlider = document.getElementById('speedSlider');
  const heightVal = document.getElementById('heightVal');
  const velVal = document.getElementById('velVal');
  const angleVal = document.getElementById('angleVal');
  const speedVal = document.getElementById('speedVal');

  const G = 9.8;
  let mode = 'freefall';
  let running = false;
  let simTime = 0;
  let simSpeed = 1;
  let animId = null;
  let lastTs = 0;

  // Physics params
  let params = { height: 50, velocity: 20, angle: 45 };
  // Sim state: x (horiz disp in meters), y (height), vx, vy
  let state = { x: 0, y: 50, vx: 0, vy: 0 };
  let trail = [];

  // Layout constants
  const GROUND_Y = H - 38;
  const SKY_TOP = 8;
  const MARKER_LEFT = 18;
  const BALL_RADIUS = 8;

  // ---- Physics functions ----

  function getY(t) {
    const h0 = params.height;
    switch (mode) {
      case 'freefall': return h0 - 0.5 * G * t * t;
      case 'vertical': return h0 + params.velocity * t - 0.5 * G * t * t;
      case 'projectile': {
        const rad = params.angle * Math.PI / 180;
        return h0 + params.velocity * Math.sin(rad) * t - 0.5 * G * t * t;
      }
    }
    return h0;
  }

  function getX(t) {
    if (mode !== 'projectile') return 0;
    const rad = params.angle * Math.PI / 180;
    return params.velocity * Math.cos(rad) * t;
  }

  function getVxVy(t) {
    switch (mode) {
      case 'freefall': return { vx: 0, vy: -G * t };
      case 'vertical': return { vx: 0, vy: params.velocity - G * t };
      case 'projectile': {
        const rad = params.angle * Math.PI / 180;
        return { vx: params.velocity * Math.cos(rad), vy: params.velocity * Math.sin(rad) - G * t };
      }
    }
    return { vx: 0, vy: 0 };
  }

  function speedAt(t) {
    const { vx, vy } = getVxVy(t);
    return Math.sqrt(vx * vx + vy * vy);
  }

  function getWorldMaxY() {
    let maxY = params.height;
    if (mode === 'vertical') {
      const maxReach = params.height + (params.velocity * params.velocity) / (2 * G);
      maxY = Math.max(maxY, maxReach);
    } else if (mode === 'projectile') {
      const rad = params.angle * Math.PI / 180;
      const vv = params.velocity * Math.sin(rad);
      const maxReach = params.height + (vv * vv) / (2 * G);
      maxY = Math.max(maxY, maxReach);
    }
    return Math.max(maxY + 12, 80);
  }

  function getWorldMaxX() {
    if (mode !== 'projectile') return 0;
    const rad = params.angle * Math.PI / 180;
    const vx = params.velocity * Math.cos(rad);
    const vy = params.velocity * Math.sin(rad);
    const flightTime = (vy + Math.sqrt(vy * vy + 2 * G * params.height)) / G;
    return vx * flightTime * 1.15;
  }

  // ---- Scale conversion ----
  let yScale, xScale, xOffset;

  function updateScales() {
    const worldH = getWorldMaxY();
    const availPixels = GROUND_Y - SKY_TOP - 6;
    yScale = availPixels / worldH;

    if (mode === 'projectile') {
      const worldW = Math.max(getWorldMaxX(), 50);
      xScale = (W - 50 - MARKER_LEFT) / worldW;
      xOffset = MARKER_LEFT + 10;
    } else {
      xScale = 1;
      xOffset = W / 2;
    }
  }

  function toCanvasX(worldX) {
    return xOffset + worldX * xScale;
  }

  function toCanvasY(worldY) {
    return GROUND_Y - worldY * yScale;
  }

  // ---- State management ----
  function resetSim() {
    simTime = 0;
    running = false;
    startBtn.textContent = '开始';
    startBtn.classList.remove('running');
    trail = [];
    state.y = params.height;
    state.x = 0;
    const { vx, vy } = getVxVy(0);
    state.vx = vx;
    state.vy = vy;
    updateScales();
    updateDisplay();
    draw();
  }

  function startPause() {
    if (running) {
      running = false;
      startBtn.textContent = '继续';
      startBtn.classList.remove('running');
    } else {
      // Check if ball has hit ground
      const y = getY(simTime);
      if (y <= 0) {
        resetSim();
        // Small delay then start
        requestAnimationFrame(() => {
          running = true;
          startBtn.textContent = '暂停';
          startBtn.classList.add('running');
          lastTs = performance.now();
        });
        return;
      }
      running = true;
      startBtn.textContent = '暂停';
      startBtn.classList.add('running');
      lastTs = performance.now();
    }
  }

  // ---- Display update ----
  function updateDisplay() {
    const y = getY(simTime);
    const dispY = Math.max(0, y);
    const v = speedAt(simTime);
    const x = getX(simTime);

    dTime.textContent = simTime.toFixed(1);
    dHeight.textContent = dispY.toFixed(1);
    dSpeed.textContent = v.toFixed(1);
    dX.textContent = x.toFixed(1);

    if (mode === 'projectile') {
      const rad = params.angle * Math.PI / 180;
      const vertDisp = params.velocity * Math.sin(rad) * simTime - 0.5 * G * simTime * simTime;
      dY.textContent = vertDisp.toFixed(1);
      document.getElementById('dYRow').classList.remove('hidden');
    } else {
      document.getElementById('dYRow').classList.add('hidden');
    }

    if (mode === 'freefall') {
      document.getElementById('dXRow').classList.add('hidden');
    } else {
      document.getElementById('dXRow').classList.remove('hidden');
    }

    // Energy bar
    const hVal = Math.max(0, y);
    const vVal = v;
    const ke = 0.5 * vVal * vVal;
    const pe = G * hVal;
    const total = ke + pe;
    dTotalE.textContent = total.toFixed(1);
    if (total > 0.001) {
      const kePct = (ke / total) * 100;
      const pePct = (pe / total) * 100;
      keFill.style.width = kePct + '%';
      peFill.style.width = pePct + '%';
    } else {
      keFill.style.width = '0%';
      peFill.style.width = '100%';
    }
  }

  // ---- Drawing ----
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, '#4a8ad4');
    skyGrad.addColorStop(0.5, '#87ceeb');
    skyGrad.addColorStop(1, '#c5e0f7');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Ground
    ctx.fillStyle = '#5a9e4a';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#4a8a3a';
    ctx.fillRect(0, GROUND_Y, W, 3);
    // Grass lines
    ctx.strokeStyle = '#6aae5a';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const gx = (i * 41 + 7) % W;
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y + 2);
      ctx.lineTo(gx - 3, GROUND_Y + 10);
      ctx.lineTo(gx + 3, GROUND_Y + 10);
      ctx.closePath();
      ctx.fillStyle = '#5a9e4a';
      ctx.fill();
    }

    // Height markers on left
    const worldH = getWorldMaxY();
    const step = worldH <= 60 ? 10 : worldH <= 120 ? 20 : 50;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '11px sans-serif';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    for (let h = 0; h <= worldH; h += step) {
      const cy = toCanvasY(h);
      if (cy < SKY_TOP || cy > GROUND_Y - 2) continue;
      ctx.beginPath();
      ctx.moveTo(MARKER_LEFT - 6, cy);
      ctx.lineTo(W - 8, cy);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillText(h + 'm', 2, cy + 4);
      ctx.setLineDash([3, 4]);
    }
    ctx.setLineDash([]);

    // Trail
    if (trail.length > 1) {
      for (let i = 0; i < trail.length; i++) {
        const alpha = 0.15 + 0.7 * (i / trail.length);
        ctx.beginPath();
        ctx.arc(trail[i].cx, trail[i].cy, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 60, 60, ${alpha})`;
        ctx.fill();
      }
      // Trail line
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255, 80, 80, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 5]);
      ctx.moveTo(trail[0].cx, trail[0].cy);
      for (let i = 1; i < trail.length; i++) {
        ctx.lineTo(trail[i].cx, trail[i].cy);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Ball
    const cy = toCanvasY(Math.max(0, getY(simTime)));
    let cx;
    if (mode === 'projectile') {
      cx = toCanvasX(getX(simTime));
    } else {
      cx = xOffset;
    }

    // Ball shadow
    ctx.beginPath();
    ctx.ellipse(cx, GROUND_Y + 2, 10, 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();

    // Ball glow
    const grad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, BALL_RADIUS + 4);
    grad.addColorStop(0, 'rgba(255,200,100,0.3)');
    grad.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, BALL_RADIUS + 4, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Ball body
    const ballGrad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, BALL_RADIUS);
    ballGrad.addColorStop(0, '#ff6b35');
    ballGrad.addColorStop(0.7, '#e05520');
    ballGrad.addColorStop(1, '#b83a10');
    ctx.beginPath();
    ctx.arc(cx, cy, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = ballGrad;
    ctx.fill();
    ctx.strokeStyle = '#8a2a08';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arrow for velocity
    const { vx, vy } = getVxVy(simTime);
    const arrowScale = 1.8;
    const ax = vx * arrowScale;
    const ay = -vy * arrowScale;
    const arrowLen = Math.sqrt(ax * ax + ay * ay);
    if (arrowLen > 3 && getY(simTime) > 0) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + ax, cy + ay);
      ctx.strokeStyle = '#ffdd44';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // Arrowhead
      const aSize = 7;
      const ang = Math.atan2(ay, ax);
      ctx.beginPath();
      ctx.moveTo(cx + ax, cy + ay);
      ctx.lineTo(cx + ax - aSize * Math.cos(ang - 0.5), cy + ay - aSize * Math.sin(ang - 0.5));
      ctx.lineTo(cx + ax - aSize * Math.cos(ang + 0.5), cy + ay - aSize * Math.sin(ang + 0.5));
      ctx.closePath();
      ctx.fillStyle = '#ffdd44';
      ctx.fill();
    }

    // If projectile, draw launch trajectory preview (dashed arc)
    if (mode === 'projectile' && simTime < 0.01) {
      const rad = params.angle * Math.PI / 180;
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 6]);
      const previewPoints = 60;
      const previewEnd = getWorldMaxX() / xScale / 1.15;
      for (let i = 0; i <= previewPoints; i++) {
        const pt = (i / previewPoints) * previewEnd;
        const py = params.height + params.velocity * Math.sin(rad) * pt - 0.5 * G * pt * pt;
        const px = params.velocity * Math.cos(rad) * pt;
        const ccx = toCanvasX(px);
        const ccy = toCanvasY(py);
        if (i === 0) ctx.moveTo(ccx, ccy);
        else ctx.lineTo(ccx, ccy);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Mode label top-right
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 15px sans-serif';
    ctx.textAlign = 'right';
    const modeNames = { freefall: '自由落体', vertical: '竖直上抛', projectile: '平抛运动' };
    ctx.fillText(modeNames[mode], W - 12, 26);
  }

  // ---- Game loop ----
  function tick(ts) {
    if (!lastTs) lastTs = ts;
    let dt = (ts - lastTs) / 1000;
    lastTs = ts;

    if (running) {
      // Cap dt to avoid jumps
      dt = Math.min(dt, 0.05);
      const simDt = dt * simSpeed;
      simTime += simDt;

      const y = getY(simTime);
      if (y <= 0) {
        simTime -= simDt;
        // Find exact time of ground hit
        let lo = 0, hi = simTime + simDt;
        for (let iter = 0; iter < 50; iter++) {
          const mid = (lo + hi) / 2;
          if (getY(mid) > 0) lo = mid;
          else hi = mid;
        }
        simTime = lo;
        running = false;
        startBtn.textContent = '开始';
        startBtn.classList.remove('running');
        // Add final trail point
        const finalCX = mode === 'projectile' ? toCanvasX(getX(simTime)) : xOffset;
        const finalCY = toCanvasY(0);
        trail.push({ cx: finalCX, cy: finalCY });
      }

      // Update trail
      if (simTime > 0) {
        const tX = mode === 'projectile' ? toCanvasX(getX(simTime)) : xOffset;
        const tY = toCanvasY(Math.max(0, getY(simTime)));
        // Only add if moved enough
        if (trail.length === 0 ||
            Math.abs(tX - trail[trail.length - 1].cx) > 1 ||
            Math.abs(tY - trail[trail.length - 1].cy) > 1) {
          trail.push({ cx: tX, cy: tY });
          if (trail.length > 300) trail.splice(0, trail.length - 300);
        }
      }

      updateDisplay();
    }

    draw();
    animId = requestAnimationFrame(tick);
  }

  // ---- Initialization ----
  function init() {
    resetSim();
    lastTs = 0;
    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(tick);
  }

  // ---- Event handlers ----
  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      mode = this.dataset.mode;

      // Show/hide controls
      document.getElementById('velGroup').classList.toggle('hidden', mode === 'freefall');
      document.getElementById('angleGroup').classList.toggle('hidden', mode !== 'projectile');

      resetSim();
    });
  });

  // Sliders
  heightSlider.addEventListener('input', function() {
    params.height = parseFloat(this.value);
    heightVal.textContent = this.value;
    if (!running) resetSim();
  });

  velSlider.addEventListener('input', function() {
    params.velocity = parseFloat(this.value);
    velVal.textContent = this.value;
    if (!running) resetSim();
  });

  angleSlider.addEventListener('input', function() {
    params.angle = parseFloat(this.value);
    angleVal.textContent = this.value;
    if (!running) resetSim();
  });

  speedSlider.addEventListener('input', function() {
    simSpeed = parseFloat(this.value);
    speedVal.textContent = simSpeed.toFixed(1);
  });

  // Buttons
  startBtn.addEventListener('click', startPause);
  resetBtn.addEventListener('click', resetSim);

  // Keyboard shortcut
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      startPause();
    }
    if (e.key === 'r' || e.key === 'R') {
      resetSim();
    }
  });

  // Handle resize for DPI
  function handleResize() {
    // No-op: canvas pixel dimensions are fixed, CSS handles display size
  }
  window.addEventListener('resize', handleResize);

  // Go
  init();
})();
</script>

</body>
</html>
